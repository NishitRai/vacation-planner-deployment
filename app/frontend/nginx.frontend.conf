# ── Vacation Planner — Frontend nginx (K8s production) ────────────────────────
#
# This container serves only static React build files.
# /api/* routing is handled entirely by the K8s Ingress controller — there are
# no proxy_pass directives here. This keeps the frontend container stateless
# and decoupled from backend topology.

server {
    listen 8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # Protect against common browser-based attacks.
    add_header X-Frame-Options           "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options    "nosniff"                               always;
    add_header X-XSS-Protection          "1; mode=block"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"       always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # Tighten CSP in production — adjust script-src if you add third-party scripts
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';"
        always;

    # ── React Router SPA fallback ─────────────────────────────────────────────
    # Requests for non-existent files fall through to index.html so that
    # client-side routes like /vacations/123 work after a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets — aggressive caching ───────────────────────────────────
    # CRA produces content-hashed filenames (main.a1b2c3.js) so 1-year
    # immutable caching is safe and eliminates repeat downloads.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── index.html — never cache ──────────────────────────────────────────────
    # The HTML entry point must always be fresh so users immediately receive
    # the latest deploy without manual cache clearing.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma        "no-cache";
    }

    # ── K8s health probe endpoint ─────────────────────────────────────────────
    # readinessProbe and livenessProbe in the Deployment hit this path.
    # Returns 200 immediately — no file lookup, no logging noise.
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── Structured logging to stdout/stderr ───────────────────────────────────
    # K8s log aggregators (Fluentd, Datadog, etc.) read from container streams.
    # Never write to files inside the container — they don't persist across restarts.
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # ── Hide nginx version from error pages and headers ───────────────────────
    server_tokens off;
}
