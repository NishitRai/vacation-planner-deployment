# ============================================================
# Vacation Planner — Nginx Reverse Proxy
#
# All traffic enters on port 80 (the only port exposed to the
# host / Vagrant VM).  Nginx splits it two ways:
#
#   /api/*    → backend:4000   (Node/Express REST API)
#   /health   → backend:4000   (health-check endpoint)
#   /*        → frontend:3000  (React dev server)
#
# The browser therefore only ever needs to know the VM's IP
# (or hostname) on port 80 — it never tries to reach :3000
# or :4000 directly.
# ============================================================

upstream backend {
    server backend:4000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

# ── Rate limiting zones ──────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

server {
    listen 8080;
    server_name _;          # accept any hostname / IP

    # ── Compression ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # ── Timeouts ────────────────────────────────────────────
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # ── Common proxy headers (applied to every location) ────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # ── /api  →  Express backend ────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend;

        proxy_set_header Connection "";   # enable keepalive to upstream
    }

    # ── /health  →  Express backend ─────────────────────────
    location = /health {
        proxy_pass http://backend;
        proxy_set_header Connection "";
        access_log off;               # don't pollute logs with health pings
    }

    # ── React dev-server WebSocket (hot-reload) ─────────────
    # The CRA dev server uses /ws for HMR.  We forward it so
    # live-reload keeps working through the proxy.
    location /ws {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Everything else  →  React frontend ──────────────────
    location / {
        proxy_pass http://frontend;

        proxy_set_header Connection "";

        # Let the React dev-server handle client-side routing.
        # If it returns 404 we don't want nginx to serve its own
        # error page — just pass the response through.
        proxy_intercept_errors off;
    }
}
